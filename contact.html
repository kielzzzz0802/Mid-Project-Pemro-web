<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact • Portofolio</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container navbar">
        <a class="nav-brand" href="index.html">Portofolio</a>
        <button class="toggle-menu" type="button" aria-label="Toggle navigation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16" />
            <path d="M4 12h16" />
            <path d="M4 18h16" />
          </svg>
        </button>
        <nav class="nav-links" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a>
          <a href="blog.html">Blog</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container reveal">
          <h1>Contact</h1>
          <p>
            Silakan tinggalkan pesan Anda.
          </p>
          <div class="grid contact-grid">
            <div class="card">
              <h2>Form Kontak</h2>
              <form id="contact-form">
                <label>
                  Nama
                  <input type="text" name="name" placeholder="Masukkan nama" required />
                </label>
                <label>
                  Email
                  <input type="email" name="email" placeholder="name@gmail.com" required />
                </label>
                <label>
                  Pesan
                  <textarea name="message" rows="5" placeholder="Tulis pesan Anda di sini" required></textarea>
                </label>
                <button class="btn" type="submit">Kirim</button>
              </form>
              <p class="form-note" id="contact-result"></p>
            </div>
            <div class="card">
              <h2>Detail Kontak</h2>
              <p>
                Hubungi saya melalui media sosial atau email.
              </p>
              <div class="social-links">
                <div class="social-item">
                  <img src="image/ig.jpeg" alt="Instagram" width="40" height="40">
                  <a href="https://instagram.com/kielzzzzzzzz" target="_blank" rel="noopener">@kielzzzzzzzz</a>
                </div>
                <div class="social-item">
                  <img src="image/wa.jpeg" alt="WhatsApp" width="40" height="40">
                  <a href="https://wa.me/6289612289429" target="_blank" rel="noopener">089612289429</a>
                </div>
                <div class="social-item">
                  <img src="image/gmail.jpeg" alt="Gmail" width="40" height="40">
                  <a href="mailto:yehezkielmontolalu026@student.unsrat.ac.id" rel="noopener">yehezkielmontolalu026@student.unsrat.ac.id</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>
          &copy; <span id="current-year"></span> Portofolio Pribadi. Dibuat dengan HTML, CSS, dan JavaScript.
        </p>
      </div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
